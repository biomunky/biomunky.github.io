title: BioMunky-Blog
description: "A Jekyll Blog"
author:
  name: "BioMunky"
  email: "biomunky@gmail.com"
  url: "https://biomunky.github.io/"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "BioMunky"
year : "2020"
